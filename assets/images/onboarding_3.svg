<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gradBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1F2" />
      <stop offset="100%" stop-color="#FFE4E6" />
    </linearGradient>
    <linearGradient id="gradBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="gradTruck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5F5DEC" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
  </defs>
  <!-- Background Board -->
  <rect width="400" height="400" rx="32" fill="url(#gradBg3)" />
  
  <!-- Speed Lines Background -->
  <line x1="50" y1="160" x2="130" y2="160" stroke="#FDA4AF" stroke-width="4" stroke-linecap="round" />
  <line x1="30" y1="200" x2="100" y2="200" stroke="#FDA4AF" stroke-width="6" stroke-linecap="round" />
  <line x1="60" y1="240" x2="140" y2="240" stroke="#FDA4AF" stroke-width="4" stroke-linecap="round" />
  
  <!-- Delivery Truck Mockup -->
  <!-- Truck Body -->
  <path d="M120,130 L260,130 L260,240 L120,240 Z" fill="url(#gradTruck)" />
  <!-- Cabin -->
  <path d="M260,160 L310,160 L340,200 L340,240 L260,240 Z" fill="#4338CA" />
  <!-- Cabin Window -->
  <path d="M275,175 L305,175 L320,200 L275,200 Z" fill="#93C5FD" />
  <!-- Wheels -->
  <circle cx="160" cy="255" r="25" fill="#1F2937" />
  <circle cx="160" cy="255" r="10" fill="#E5E7EB" />
  <circle cx="290" cy="255" r="25" fill="#1F2937" />
  <circle cx="290" cy="255" r="10" fill="#E5E7EB" />
  
  <!-- Large Package Box Floating -->
  <g transform="translate(140, 70) scale(0.6)">
    <!-- Box isometric representation -->
    <path d="M50,10 L90,30 L50,50 L10,30 Z" fill="url(#gradBox)" />
    <path d="M10,30 L50,50 L50,90 L10,70 Z" fill="#92400E" />
    <path d="M50,50 L90,30 L90,70 L50,90 Z" fill="#78350F" />
    <!-- Tape -->
    <path d="M50,30 L70,40 L50,50 L30,40 Z" fill="#FBBF24" opacity="0.8" />
  </g>
</svg>
