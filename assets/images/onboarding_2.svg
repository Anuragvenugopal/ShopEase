<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gradBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5" />
      <stop offset="100%" stop-color="#D1FAE5" />
    </linearGradient>
    <linearGradient id="gradCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#374151" />
    </linearGradient>
    <linearGradient id="gradSuccess" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  <!-- Background Board -->
  <rect width="400" height="400" rx="32" fill="url(#gradBg)" />
  <!-- Credit Card Mockup -->
  <rect x="70" y="80" width="220" height="130" rx="16" fill="url(#gradCard)" transform="rotate(-10 180 145)" />
  <rect x="95" y="110" width="35" height="25" rx="4" fill="#FBBF24" transform="rotate(-10 180 145)" />
  <circle cx="240" cy="170" r="15" fill="#EF4444" opacity="0.8" transform="rotate(-10 180 145)" />
  <circle cx="260" cy="170" r="15" fill="#F59E0B" opacity="0.8" transform="rotate(-10 180 145)" />
  
  <!-- Smartphone Device Mockup -->
  <rect x="190" y="120" width="130" height="220" rx="22" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="4" />
  <!-- Phone Notch -->
  <rect x="235" y="120" width="40" height="8" rx="4" fill="#D1D5DB" />
  <!-- Success Circle -->
  <circle cx="255" cy="210" r="30" fill="url(#gradSuccess)" />
  <path d="M245,210 L252,217 L267,202" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Payment Complete Text simulation -->
  <rect x="215" y="260" width="80" height="12" rx="4" fill="#D1D5DB" />
  <rect x="230" y="280" width="50" height="8" rx="3" fill="#E5E7EB" />
  <circle cx="255" cy="315" r="10" fill="#5F5DEC" />
</svg>
